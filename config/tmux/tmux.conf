# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g mouse on
#gruv theme
#set -g @plugin 'z3z1ma/tmux-gruvbox'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @gruvbox_flavour 'dark'

# settings
set -g default-terminal "tmux-256color"
set -gq allow-passthrough on

#vim
setw -g mode-keys vi

# === Clipboard: Copy to system clipboard by default ===
set -g set-clipboard external      # This is the key setting
set -g allow-passthrough on

# Enable OSC52 clipboard support (works in most modern terminals)
set -ag terminal-features ",*:clipboard:osc52"
set -ag terminal-overrides ",xterm-256color:clipboard:osc52"
set -ag terminal-overrides ",tmux-256color:clipboard:osc52"

# Vi copy mode settings
setw -g mode-keys vi

# Make Enter and 'y' copy to system clipboard and exit copy mode
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Optional: Mouse drag also copies to clipboard automatically
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

#tpm: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm and press C-b I
run '~/.config/tmux/plugins/tpm/tpm'
