# ---- Video renderer ----
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe

# ---- Output / dither ----
# XV272K V5 is 10-bit; let mpv pick
dither-depth=auto

# ---- HDR / color management ----
# Tells Hyprland to switch monitor to HDR when playing HDR content
target-colorspace-hint=yes
# For your DisplayHDR 400 panel — real peak brightness, not the spec sheet
target-peak=400
# IPS contrast is ~1000:1
target-contrast=1000

# ---- Scalers (your 6800XT can handle these easily) ----
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
# Antiringing now actually does something
scale-antiring=0.7
cscale-antiring=0.7

# ---- Debanding ----
# Leave off unless you see banding; modern content rarely needs it
deband=no
# (deband-* sub-options removed — they did nothing with deband=no)

# ---- YouTube ----
ytdl-format=bestvideo[height<=?1440]+bestaudio/best
script-opts=ytdl_hook-ytdl_path=yt-dlp
# Pull cookies live from firefox's store — no stale cookies.txt to maintain
ytdl-raw-options=cookies-from-browser=firefox

# ---- Audio / misc ----
volume=50
no-audio-display
keep-open=yes
save-position-on-quit=yes
